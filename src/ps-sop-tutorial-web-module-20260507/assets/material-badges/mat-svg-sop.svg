<svg xmlns="http://www.w3.org/2000/svg" width="144" height="56" viewBox="0 0 144 56" role="img" aria-label="SOP">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbf7ff"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-50%" width="160%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#7a3cff" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- Outer badge -->
  <rect x="1.2" y="1.2" width="141.6" height="53.6" rx="14" fill="url(#bg)" stroke="#7a3cff" stroke-width="1.6" filter="url(#softShadow)"/>

  <!-- Left icon chip -->
  <circle cx="24" cy="28" r="18.5" fill="#f1eaff" stroke="#e1d2ff" stroke-width="1"/>
  <!-- Graduation cap icon -->
  <path d="M16.8 26.1 28 20.8l11.2 5.3L28 31.4l-11.2-5.3Z" fill="none" stroke="#7a3cff" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M20.8 28v6.2c2.6 1.8 5.4 2.7 7.2 2.7s4.6-.9 7.2-2.7V28" fill="none" stroke="#7a3cff" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M39.2 26.2v7.2" fill="none" stroke="#7a3cff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Text -->
  <text x="58" y="28" text-anchor="start" dominant-baseline="middle" font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#7a3cff">SOP</text>
</svg>
